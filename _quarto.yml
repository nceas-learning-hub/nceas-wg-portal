project:
  type: website
  execute-dir: project
  output-dir: docs
  render:
    - "*.qmd"

editor: source
execute:
  freeze: auto
filters:
  - nceas-learning-hub/theme
exercises: ### for custom theme callouts
  number: true ### see https://cambiotraining.github.io/quarto-course-template/materials/02-content_guidelines.html

website:
  title: "NCEAS Training Series: Supporting Effective Collaboration in Working Groups"
  repo-url: https://github.com/nceas-learning-hub/nceas-wg-portal
  favicon: images/logo_lh.png
  bread-crumbs: true
  navbar:
    right:
      - text: "Instructors"
        menu:
          - text: "Nick J Lyon"
            href: https://njlyon0.github.io/
          - text: "Li Kui"
            href: https://github.com/lkuiucsb
      - icon: github
        href: https://github.com/nceas-learning-hub/nceas-wg-portal
        aria-label: GitHub
  sidebar:
    title: "Materials"
    search: true
    tools:
      - icon: house-door-fill
        href: https://www.nceas.ucsb.edu/learning-hub
      - icon: github
        href: nceas-learning-hub.github.io/nceas-wg-portal
    contents:
      - index.qmd
      - section: "Working Groups Learning"
        contents:
        - s01_lecture_facilitating_working_group.qmd
        - s02_github_introduction.qmd
        - s12_lecture_canvas.qmd
        - s03_lecture_data_mgmt_reproducibility.qmd
        - s04_github_project_management.qmd
        - s05_github_collaboration.qmd
        - s06_lecture_communication_plan.qmd
      - section: "Additional Resources"
        contents:
        - s07_lecture_one_pagers.qmd
        - s08_lecture_communication_results.qmd
        - s09_r_git_install_guide.qmd
        - s10_r_parallel_computing.qmd
        - s11_data_resources.qmd
  page-footer:
    center: "Copyright &copy; 2026, NCEAS"

format:
  theme-html
